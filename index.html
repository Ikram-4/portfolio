<!DOCTYPE html>
<html>
<head>
  <title>ikram.codes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff9f;
      font-family: monospace;
      overflow: hidden;
    }

    #terminal {
      padding: 20px;
      height: 100vh;
      overflow-y: auto;
    }

    .line { margin: 5px 0; }

    .input-line {
      display: flex;
    }

    .prompt {
      margin-right: 5px;
      color: #00ff9f;
    }

    input {
      background: transparent;
      border: none;
      color: #00ff9f;
      outline: none;
      width: 100%;
      font-family: monospace;
    }

    .glitch {
      color: #58a6ff;
      animation: flicker 1.5s infinite;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
</head>

<body>

<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

function print(text, cls="line") {
  const div = document.createElement("div");
  div.className = cls;
  div.innerHTML = text;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function createInput() {
  const div = document.createElement("div");
  div.className = "input-line";

  const prompt = document.createElement("span");
  prompt.className = "prompt";
  prompt.innerText = "ikram@root:~$";

  const input = document.createElement("input");

  div.appendChild(prompt);
  div.appendChild(input);
  terminal.appendChild(div);

  input.focus();

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      handleCommand(input.value.trim().toLowerCase());
      input.disabled = true;
      createInput();
    }
  });
}

function boot() {
  print("Initializing secure terminal...");
  setTimeout(()=>print("Bypassing firewall..."), 500);
  setTimeout(()=>print("Access granted.", "glitch"), 1000);
  setTimeout(()=>print("Type 'help' to begin\n"), 1500);
  setTimeout(createInput, 1600);
}

function handleCommand(cmd) {
  if (!cmd) return;

  print("➜ " + cmd);

  switch(cmd) {

    case "help":
      print(`
Available commands:<br>
help, about, skills, projects, experience, contact, hack, clear
`);
      break;

    case "about":
      print("Backend developer + cybersecurity enthusiast.");
      break;

    case "skills":
      print("Java | Spring Boot | Security | Burp Suite | REST APIs");
      break;

    case "projects":
      print(`
[1] RBAC System → secure role-based auth<br>
[2] Employee Manager → CRUD + REST APIs
`);
      break;

    case "experience":
      print("Reported critical vulnerability (CVSS 9.4).");
      break;

    case "contact":
      print(`
Email: shaikikram2005@gmail.com<br>
GitHub: github.com/Ikram-4
`);
      break;

    case "hack":
      fakeHack();
      break;

    case "clear":
      terminal.innerHTML = "";
      break;

    default:
      print("Command not found.");
  }
}

function fakeHack() {
  print("Injecting payload...");
  setTimeout(()=>print("Bypassing authentication..."), 500);
  setTimeout(()=>print("Escalating privileges..."), 1000);
  setTimeout(()=>print("Accessing database..."), 1500);
  setTimeout(()=>print("✔ ROOT ACCESS GRANTED", "glitch"), 2000);
}

boot();
</script>

</body>
</html>
